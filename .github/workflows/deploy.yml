name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main, staging]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Main
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: ${{ secrets.WORKER_NAME || vars.WORKER_NAME || github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: npx @opennextjs/cloudflare build
        env:
          BETTER_AUTH_SECRET: placeholder-build-only
          BETTER_AUTH_URL: https://placeholder.workers.dev
      - name: Check deploy prerequisites
        id: deploy_prereqs
        run: |
          missing=""
          for var_name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!var_name}" ]; then
              missing="$missing $var_name"
            fi
          done

          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

          echo "Deploying worker: $WORKER_NAME"
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"
      - name: Apply database migrations
        if: steps.deploy_prereqs.outputs.can_deploy == 'true'
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::Skipping migrations; DATABASE_URL not set on this repo"
            exit 0
          fi
          pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Deploy worker
        if: steps.deploy_prereqs.outputs.can_deploy == 'true'
        run: |
          echo "Deploying worker: $WORKER_NAME"
          pnpm dlx wrangler@4.83.0 deploy --name "$WORKER_NAME"
      - name: Set worker secrets
        if: steps.deploy_prereqs.outputs.can_deploy == 'true'
        run: |
          printf '{"DATABASE_URL":"%s","COMPANY_ID":"%s","NODE_ENV":"%s","BETTER_AUTH_SECRET":"%s","BETTER_AUTH_URL":"%s","BETTER_AUTH_TRUSTED_ORIGINS":"%s","NEXT_PUBLIC_APP_URL":"%s","GONDOOR_API_BASE":"%s","GONDOOR_API_KEY":"%s","GONDOOR_TENANT_ID":"%s","GONDOOR_WEBHOOK_SECRET":"%s","GONDOOR_SAAS_APP_API_KEY":"%s","GONDOOR_SAAS_VERIFICATION_SECRET":"%s"}' \
            "$DATABASE_URL" "$COMPANY_ID" "$NODE_ENV" "$BETTER_AUTH_SECRET" "$BETTER_AUTH_URL" "$BETTER_AUTH_TRUSTED_ORIGINS" "$NEXT_PUBLIC_APP_URL" "$GONDOOR_API_BASE" "$GONDOOR_API_KEY" "$GONDOOR_TENANT_ID" "$GONDOOR_WEBHOOK_SECRET" "$GONDOOR_SAAS_APP_API_KEY" "$GONDOOR_SAAS_VERIFICATION_SECRET" \
            | pnpm dlx wrangler@4.83.0 secret bulk --name "$WORKER_NAME"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GONDOOR_API_BASE: ${{ secrets.GONDOOR_API_BASE }}
          GONDOOR_API_KEY: ${{ secrets.GONDOOR_API_KEY }}
          GONDOOR_TENANT_ID: ${{ secrets.GONDOOR_TENANT_ID }}
          GONDOOR_WEBHOOK_SECRET: ${{ secrets.GONDOOR_WEBHOOK_SECRET }}
          GONDOOR_SAAS_APP_API_KEY: ${{ secrets.GONDOOR_SAAS_APP_API_KEY }}
          GONDOOR_SAAS_VERIFICATION_SECRET: ${{ secrets.GONDOOR_SAAS_VERIFICATION_SECRET }}
