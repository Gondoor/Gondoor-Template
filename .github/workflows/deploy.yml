name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main, staging]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Main
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WORKER_NAME: ${{ secrets.WORKER_NAME || vars.WORKER_NAME || github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: npx @opennextjs/cloudflare build
        env:
          BETTER_AUTH_SECRET: placeholder-build-only
          BETTER_AUTH_URL: https://placeholder.workers.dev
      - name: Check deploy prerequisites
        id: deploy_prereqs
        run: |
          missing=""
          for var_name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!var_name}" ]; then
              missing="$missing $var_name"
            fi
          done

          if [ -n "$missing" ]; then
            echo "::warning::Skipping Cloudflare deploy; missing required secrets:$missing"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Deploying worker: $WORKER_NAME"
          echo "can_deploy=true" >> "$GITHUB_OUTPUT"
      - name: Deploy worker
        if: steps.deploy_prereqs.outputs.can_deploy == 'true'
        run: |
          echo "Deploying worker: $WORKER_NAME"
          pnpm dlx wrangler@4.83.0 deploy --name "$WORKER_NAME"
      - name: Set worker secrets
        if: steps.deploy_prereqs.outputs.can_deploy == 'true'
        run: |
          printf '{"DATABASE_URL":"%s","COMPANY_ID":"%s","NODE_ENV":"%s","BETTER_AUTH_SECRET":"%s","BETTER_AUTH_URL":"%s"}' \
            "$DATABASE_URL" "$COMPANY_ID" "$NODE_ENV" "$BETTER_AUTH_SECRET" "$BETTER_AUTH_URL" \
            | pnpm dlx wrangler@4.83.0 secret bulk --name "$WORKER_NAME"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
