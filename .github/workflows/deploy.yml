name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: npx @opennextjs/cloudflare build
        env:
          BETTER_AUTH_SECRET: placeholder-build-only
          BETTER_AUTH_URL: https://placeholder.workers.dev
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ secrets.WORKER_NAME }}
      - name: Set worker secrets
        run: |
          printf '{"DATABASE_URL":"%s","COMPANY_ID":"%s","NODE_ENV":"%s","BETTER_AUTH_SECRET":"%s","BETTER_AUTH_URL":"%s"}' \
            "$DATABASE_URL" "$COMPANY_ID" "$NODE_ENV" "$BETTER_AUTH_SECRET" "$BETTER_AUTH_URL" \
            | npx wrangler secret bulk --name "$WORKER_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ secrets.WORKER_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
