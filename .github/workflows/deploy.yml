name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Main
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: npx @opennextjs/cloudflare build
        env:
          BETTER_AUTH_SECRET: placeholder-build-only
          BETTER_AUTH_URL: https://placeholder.workers.dev
      - name: Validate Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy worker
        run: pnpm dlx wrangler@4.83.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Set worker secrets
        run: |
          printf '{"DATABASE_URL":"%s","COMPANY_ID":"%s","NODE_ENV":"%s","BETTER_AUTH_SECRET":"%s","BETTER_AUTH_URL":"%s"}' \
            "$DATABASE_URL" "$COMPANY_ID" "$NODE_ENV" "$BETTER_AUTH_SECRET" "$BETTER_AUTH_URL" \
            | pnpm dlx wrangler@4.83.0 secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
